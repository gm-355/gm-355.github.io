<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiny Project 06: Layout for Weather App</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <main id="app">

        <header>
            <h1>Weather App</h1>
            <p id="location">New York, NY</p>
            <button id="openModal">Change location</button>
        </header>

        <section id="now">
            <div id="tempNow">-3°C</div>

            <div id="conditionNow">
                <img id="iconNow" src="" alt="Current weather icon">
                <span class="text" id="conditionTextNow">Cloudy</span>
            </div>
        </section>

        <section id="details">
            <div class="detailBox">
                <p class="label">Wind</p>
                <p class="value" id="windNow">10 km/h SW</p>
            </div>

            <div class="detailBox">
                <p class="label">Humidity</p>
                <p class="value" id="humidityNow">62%</p>
            </div>
        </section>

        <section id="forecast">
            <h2>Next 3 Days</h2>

            <div class="days">

                <div class="day">
                    <p class="dayName" id="day1Name">Sun</p>
                    <img class="dayIcon" id="day1Icon" src="" alt="Day 1 weather icon">
                    <p class="dayCond" id="day1Cond">Cloudy</p>
                    <p class="dayTemp" id="day1Temp">5°C / -3°C</p>
                    <p class="dayWind" id="day1Wind">13 km/h</p>
                </div>

                <div class="day">
                    <p class="dayName" id="day2Name">Mon</p>
                    <img class="dayIcon" id="day2Icon" src="" alt="Day 2 weather icon">
                    <p class="dayCond" id="day2Cond">Mostly cloudy</p>
                    <p class="dayTemp" id="day2Temp">4°C / -1°C</p>
                    <p class="dayWind" id="day2Wind">16 km/h</p>
                </div>

                <div class="day">
                    <p class="dayName" id="day3Name">Tue</p>
                    <img class="dayIcon" id="day3Icon" src="" alt="Day 3 weather icon">
                    <p class="dayCond" id="day3Cond">Mostly sunny</p>
                    <p class="dayTemp" id="day3Temp">8°C / 1°C</p>
                    <p class="dayWind" id="day3Wind">14 km/h</p>
                </div>

            </div>
        </section>

    </main>

    <div id="modalBackground"></div>

    <div id="locationModal">
        <form id="locationForm">
            <label for="newLocation">Enter a location</label>
            <input type="text" name="newLocation" id="newLocation" placeholder="City or zip code" required>
            <button type="submit">Search</button>
        </form>
    </div>

    <script src="scripts.js"></script>
</body>

</html>
